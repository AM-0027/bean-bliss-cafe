<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Customer Dashboard</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/customer.css" />
</head>
<body onload="initCustomerPage()">

  <header class="navbar">
    <h2>☕ Bean Bliss Café</h2>
    <div class="nav-actions">
      <span id="customerWelcome"></span>
      <button onclick="openCart()">🛒 Cart (<span id="cartCount">0</span>)</button>
      <button onclick="goToOrders()">📦 My Orders</button>
      <button onclick="logout()">Logout</button>
    </div>
  </header>

  <section class="hero">
    <div class="hero-text">
      <h1>Freshly Brewed Happiness</h1>
      <p>Enjoy handcrafted coffee, snacks, and desserts.</p>
      <button onclick="scrollToMenu()">Explore Menu</button>
    </div>
  </section>

  <section class="menu-section" id="menuSection">
  <div class="menu-topbar">
    <div>
      <h2>Our Signature Menu</h2>
      <p>Explore handcrafted drinks and delicious bites</p>
    </div>

    <div class="top-actions">
      <div class="search-box">
        <input type="text" id="menuSearch" placeholder="Search menu..." onkeyup="searchMenu()">
      </div>

      <button class="theme-toggle" onclick="toggleTheme()">
        <span id="themeIcon">🌙</span>
      </button>
    </div>
  </div>

  <div id="toastBox" class="toast-box"></div>

  <div id="categoryContainer" class="category-container"></div>

  <div class="menu-grid" id="menuContainer"></div>
</section>

  <!-- Cart Modal -->
  <div id="cartModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeCart()">&times;</span>
      <h2>🛒 Your Cart</h2>
      <div id="cartItems"></div>
      <div class="cart-extra">
        <label>Table Number:</label>
        <input type="number" id="tableNumber" placeholder="Enter table number">
      </div>
      <h3>Total: ₹<span id="cartTotal">0</span></h3>
      <button onclick="goToPayment()">Proceed to Payment</button>
    </div>
  </div>

  <script src="../data/menuData.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/menu.js"></script>
  <script src="../js/cart.js"></script>
</body>
</html>
