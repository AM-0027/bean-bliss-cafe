<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="../css/payment.css"/>
</head>
<body onload="loadPaymentPage()">

  <div class="payment-box">
    <h2>💳 Payment</h2>
    <p>Total Amount: ₹<span id="paymentAmount">0</span></p>

    <input type="text" id="cardName" placeholder="Card Holder Name">
    <input type="text" id="cardNumber" placeholder="Card Number" maxlength="16">
    <input type="text" id="expiry" placeholder="MM/YY">
    <input type="text" id="cvv" placeholder="CVV" maxlength="3">

    <button onclick="placeOrder()">Pay Now</button>
    <button class="secondary" onclick="goBackCustomer()">Back</button>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/payment.js"></script>
</body>
</html>
