apiVersion: v1
kind: Service
metadata:
  name: cafe-service
spec:
  type: NodePort
  selector:
    app: cafe-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30001 # Access via this port
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cafe-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cafe-frontend
  template:
    metadata:
      labels:
        app: cafe-frontend
    spec:
      containers:
      - name: cafe-app
        image: bean-bliss-frontend:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 80